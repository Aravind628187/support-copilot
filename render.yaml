services:
  - type: web
    name: support-copilot-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    # Prisma migrations are idempotent and must run before the new OAuth
    # database table is queried. This also works on Render's free plan, where
    # preDeployCommand is unavailable.
    startCommand: npm run db:migrate:deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://your-frontend-url.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: support-copilot-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        value: ""

databases:
  - name: support-copilot-db
    databaseName: supportcopilot
    user: supportcopilot
